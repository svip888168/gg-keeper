<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giffgaff 保号助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { 
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 { 
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }
        .info-box strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        #status {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #status.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        #status.loading {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        #status.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .stats {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GG保号</h1>


        <div class="info-box">
            <strong>本次将消耗：</strong>
            预计消耗: 120~140 kb<br>
            预计费用：£0.02~0.03
        </div>

        <button id="btn" onclick="consumeData()">
            🔋 开始保号
        </button>

        <div id="status"></div>
    </div>

    <script>
        function consumeData() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            btn.disabled = true;
            status.className = 'loading';
            status.innerHTML = "📡 正在连接服务器...<br><div class='stats'>请保持网络连接</div>";

            // 防缓存：添加时间戳
            const timestamp = new Date().getTime();
            const randomStr = Math.random().toString(36).substring(7);
            const fileUrl = `payload.txt?t=${timestamp}&r=${randomStr}`;

            const startTime = new Date().getTime();

            fetch(fileUrl, {
                cache: 'no-store',
                headers: {
                    'Cache-Control': 'no-cache, no-store, must-revalidate',
                    'Pragma': 'no-cache'
                }
            })
                .then(response => {
                    if (!response.ok) throw new Error('网络请求失败');
                    return response.blob();
                })
                .then(blob => {
                    const sizeInKB = (blob.size / 1024).toFixed(2);
                    const duration = ((new Date().getTime() - startTime) / 1000).toFixed(2);

                    status.className = 'success';
                    status.innerHTML = `
                        ✅ 保号成功！
                        <div class='stats'>
                            已消耗：${sizeInKB} KB<br>
                            耗时：${duration} 秒
                        </div>
                    `;

                    btn.disabled = false;
                    btn.innerText = "🔄 再次保号";
                })
                .catch(error => {
                    status.className = 'error';
                    status.innerHTML = `
                        ❌ 操作失败
                        <div class='stats'>${error.message}</div>
                    `;
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
